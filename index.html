<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PromptForge — конструктор промтов</title>
  <meta name="theme-color" content="#eef1f7" id="themeColor" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb--1"></span>
    <span class="orb orb--2"></span>
    <span class="orb orb--3"></span>
  </div>

  <main class="shell">
    <header class="masthead">
      <div class="brand">
        <span class="brand__mark" id="brandMark"></span>
        <span class="brand__name">PromptForge</span>
      </div>
      <p class="masthead__sub">Соберите точный промт по шагам</p>
      <div class="topbar">
        <button class="history-btn" id="libraryBtn" type="button"><span id="libraryIcon"></span> Библиотека</button>
        <button class="history-btn" id="historyBtn" type="button"><span id="historyIcon"></span> История</button>
        <button class="history-btn icon-only" id="themeBtn" type="button" title="Сменить тему"><span id="themeIcon"></span></button>
      </div>
    </header>

    <!-- Прогресс -->
    <nav class="steps" id="steps" aria-label="Шаги">
      <button class="step" data-step="0"><i>1</i><span>Категория</span></button>
      <span class="step-line"></span>
      <button class="step" data-step="1"><i>2</i><span>Тип</span></button>
      <span class="step-line"></span>
      <button class="step" data-step="2"><i>3</i><span>Настройки</span></button>
      <span class="step-line"></span>
      <button class="step" data-step="3"><i>4</i><span>Промт</span></button>
    </nav>

    <!-- Сцена с панелями -->
    <section class="stage" id="stage"><!-- панели рендерятся из JS --></section>
  </main>

  <!-- Модалка истории и шаблонов -->
  <div class="modal" id="historyModal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card">
      <div class="modal__head">
        <div class="modal__tabs">
          <button class="modal__tab is-on" data-tab="history" type="button">История</button>
          <button class="modal__tab" data-tab="favorites" type="button">Шаблоны</button>
        </div>
        <button class="icon-btn" data-close type="button">✕</button>
      </div>
      <div class="history-list" id="historyList"></div>
      <div class="modal__foot">
        <button class="btn btn--ghost" id="listClear" type="button">Очистить</button>
        <button class="btn" data-close type="button">Закрыть</button>
      </div>
    </div>
  </div>

  <!-- Модалка библиотеки готовых промтов -->
  <div class="modal" id="libraryModal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__card modal__card--wide">
      <div class="modal__head">
        <div class="panel__title">Библиотека готовых промтов</div>
        <button class="icon-btn" data-close type="button">✕</button>
      </div>
      <div class="search"><span class="search__ic" id="libSearchIcon"></span><input type="text" id="librarySearch" placeholder="Поиск по библиотеке…" /></div>
      <div class="lib-groups" id="libraryGroups"></div>
      <div class="history-list" id="libraryList"></div>
    </div>
  </div>

  <script src="icons.js"></script>
  <script src="data.js"></script>
  <script src="library.js"></script>
  <script src="app.js"></script>
</body>
</html>
